    <h3>About This Lab</h3>
    <p>In this lab, you will learn basic HTML structure, formatting text, creating simple tables, and using forms for input.</p>

    <table>
        <tr>
            <th>Item Name</th>
            <th>Quantity</th>
            <th>Status</th>
        </tr>
        <tr>
            <td>Pencils</td>
            <td>100</td>
            <td>In Stock</td>
        </tr>
        <tr>
            <td>Notebooks</td>
            <td>50</td>
            <td>Low Stock</td>
        </tr>
            <td>Markers</td>

        </tr>
        </table>


    </br>
    </br>
    </br>


        <div class="contact-info">
        <h2 class="contact-title">Contact Information</h2>
        <form>
            <div class="form-row">
                <label>Name:</label>
                <input type="text" name="name">
            </div>

            <div class="form-row">
                <label>Email:</label>
                <input type="email" name="email">
            </div>
            
            <div class="form-row">
                <label>Message:</label>
                <textarea name="message"></textarea>
            </div>
            
            <div class="submit-row">
                <button type="submit" class="btn">Submit</button>
            </div>
        </form>
    </div>

</body>
